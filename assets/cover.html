<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anneal Cover Image</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
  }
  .canvas {
    width: 1280px;
    height: 640px;
    background: #0F172A;
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>

<div class="canvas">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
    <defs>
      <!-- Convergence glow at global minimum -->
      <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#818CF8" stop-opacity="0.6"/>
        <stop offset="40%" stop-color="#4F46E5" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
      </radialGradient>
      <!-- Subtle grid texture -->
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <line x1="0" y1="40" x2="40" y2="40" stroke="#1E293B" stroke-width="0.5"/>
        <line x1="40" y1="0" x2="40" y2="40" stroke="#1E293B" stroke-width="0.5"/>
      </pattern>
    </defs>

    <!-- Background grid texture -->
    <rect width="1280" height="640" fill="url(#grid)"/>

    <!-- Optimization landscape curve -->
    <path d="M 0,420
             C 60,420 80,380 120,340
             C 160,300 180,310 200,350
             C 220,390 240,400 280,390
             C 320,380 340,320 380,280
             C 420,240 440,260 460,310
             C 480,360 500,380 540,370
             C 580,360 600,300 640,260
             C 680,220 700,240 720,290
             C 740,340 760,360 800,350
             C 840,340 860,280 900,220
             C 920,180 940,170 960,190
             C 980,210 1000,250 1020,280
             C 1040,310 1060,340 1100,360
             C 1140,380 1180,390 1220,395
             C 1250,398 1270,400 1280,400"
          fill="none" stroke="#818CF8" stroke-width="2" opacity="0.7"/>

    <!-- Filled area below curve (very subtle) -->
    <path d="M 0,420
             C 60,420 80,380 120,340
             C 160,300 180,310 200,350
             C 220,390 240,400 280,390
             C 320,380 340,320 380,280
             C 420,240 440,260 460,310
             C 480,360 500,380 540,370
             C 580,360 600,300 640,260
             C 680,220 700,240 720,290
             C 740,340 760,360 800,350
             C 840,340 860,280 900,220
             C 920,180 940,170 960,190
             C 980,210 1000,250 1020,280
             C 1040,310 1060,340 1100,360
             C 1140,380 1180,390 1220,395
             C 1250,398 1270,400 1280,400
             L 1280,640 L 0,640 Z"
          fill="#818CF8" opacity="0.04"/>

    <!-- Convergence glow at global minimum (~x=940, y=170) -->
    <circle cx="940" cy="175" r="60" fill="url(#glow)"/>

    <!-- Optimization path (dotted trail) -->
    <path d="M 80,400
             L 120,340 L 200,350 L 280,390
             L 380,280 L 460,310 L 540,370
             L 640,260 L 720,290 L 800,350
             L 900,220 L 940,175"
          fill="none" stroke="#F8FAFC" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.3"/>

    <!-- Experiment dots along the path -->
    <!-- Start point -->
    <circle cx="80" cy="400" r="4" fill="#94A3B8" opacity="0.6"/>

    <!-- KEPT (descending moves) — green -->
    <circle cx="120" cy="340" r="4.5" fill="#34D399"/>
    <circle cx="380" cy="280" r="4.5" fill="#34D399"/>
    <circle cx="640" cy="260" r="4.5" fill="#34D399"/>
    <circle cx="900" cy="220" r="4.5" fill="#34D399"/>
    <circle cx="940" cy="175" r="5.5" fill="#34D399"/>

    <!-- DISCARDED (worse moves reverted) — red -->
    <circle cx="200" cy="350" r="3.5" fill="#F87171" opacity="0.8"/>
    <circle cx="460" cy="310" r="3.5" fill="#F87171" opacity="0.8"/>
    <circle cx="720" cy="290" r="3.5" fill="#F87171" opacity="0.8"/>

    <!-- Annealing uphill moves (escaping local optima) — amber -->
    <circle cx="280" cy="390" r="4" fill="#FBBF24"/>
    <circle cx="540" cy="370" r="4" fill="#FBBF24"/>
    <circle cx="800" cy="350" r="4" fill="#FBBF24"/>

    <!-- Convergence ring at global minimum -->
    <circle cx="940" cy="175" r="12" fill="none" stroke="#F8FAFC" stroke-width="1" opacity="0.4"/>
    <circle cx="940" cy="175" r="20" fill="none" stroke="#F8FAFC" stroke-width="0.5" opacity="0.2"/>

    <!-- Project name -->
    <text x="72" y="92" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="600" font-size="52" fill="#F8FAFC" letter-spacing="-1">anneal</text>

    <!-- Tagline -->
    <text x="74" y="124" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="400" font-size="17" fill="#94A3B8">Autonomous optimization for any measurable artifact.</text>

    <!-- Legend (bottom-left, minimal) -->
    <g transform="translate(72, 570)" opacity="0.7">
      <circle cx="0" cy="0" r="4" fill="#34D399"/>
      <text x="12" y="4" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="11" fill="#94A3B8">kept</text>
      <circle cx="60" cy="0" r="3.5" fill="#F87171"/>
      <text x="72" y="4" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="11" fill="#94A3B8">discarded</text>
      <circle cx="148" cy="0" r="4" fill="#FBBF24"/>
      <text x="160" y="4" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="11" fill="#94A3B8">annealing</text>
    </g>

    <!-- Cycle diagram (top-right, minimal) -->
    <g transform="translate(1080, 72)" opacity="0.35">
      <!-- Artifact icon (document) -->
      <rect x="0" y="0" width="20" height="24" rx="2" fill="none" stroke="#F8FAFC" stroke-width="1.2"/>
      <line x1="4" y1="8" x2="16" y2="8" stroke="#F8FAFC" stroke-width="1" opacity="0.6"/>
      <line x1="4" y1="13" x2="14" y2="13" stroke="#F8FAFC" stroke-width="1" opacity="0.6"/>
      <line x1="4" y1="18" x2="10" y2="18" stroke="#F8FAFC" stroke-width="1" opacity="0.6"/>
      <text x="10" y="38" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="9" fill="#F8FAFC" text-anchor="middle">artifact</text>

      <!-- Arrow to eval -->
      <line x1="24" y1="12" x2="56" y2="12" stroke="#F8FAFC" stroke-width="0.8" marker-end="url(#arrowSmall)"/>

      <!-- Eval icon (gauge) -->
      <circle cx="76" cy="12" r="12" fill="none" stroke="#F8FAFC" stroke-width="1.2"/>
      <line x1="76" y1="12" x2="82" y2="6" stroke="#F8FAFC" stroke-width="1.2" stroke-linecap="round"/>
      <text x="76" y="38" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="9" fill="#F8FAFC" text-anchor="middle">eval</text>

      <!-- Arrow to agent -->
      <line x1="92" y1="12" x2="124" y2="12" stroke="#F8FAFC" stroke-width="0.8"/>

      <!-- Agent icon (brain/circle) -->
      <circle cx="140" cy="12" r="12" fill="none" stroke="#F8FAFC" stroke-width="1.2"/>
      <path d="M133,10 C135,5 138,4 140,6 C142,4 145,5 147,10 C149,13 147,18 140,19 C133,18 131,13 133,10" fill="none" stroke="#F8FAFC" stroke-width="0.8"/>
      <text x="140" y="38" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="9" fill="#F8FAFC" text-anchor="middle">agent</text>

      <!-- Return arrow (below, curving back) -->
      <path d="M130,28 C100,52 50,52 14,28" fill="none" stroke="#F8FAFC" stroke-width="0.8" stroke-dasharray="3,3"/>
    </g>

    <!-- Small arrowhead marker -->
    <defs>
      <marker id="arrowSmall" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M 0 0 L 8 4 L 0 8 z" fill="#F8FAFC"/>
      </marker>
    </defs>
  </svg>
</div>

</body>
</html>
