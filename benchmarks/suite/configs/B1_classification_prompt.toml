# B1: System prompt for binary classification tasks.
# Stochastic eval — 5 binary criteria, 50 experiments per run.

[meta]
target_id = "B1"
domain = "prompt"
eval_mode = "stochastic"
direction = "maximize"
experiment_budget = 50
sample_count = 10
confidence_level = 0.95

[generation]
prompt_template = "Using the system prompt in B1_classification_system_prompt.md, classify the following text into one of the provided categories:\n\n'{test_prompt}'"
output_format = "text"

[[criteria]]
name = "correct_category"
question = "Does the response select exactly one category from the provided list without inventing new categories? Answer only YES or NO."

[[criteria]]
name = "concise_output"
question = "Is the response a single word or short phrase (the category label) without verbose explanation? Answer only YES or NO."

[[criteria]]
name = "follows_format"
question = "Does the response strictly follow the output format specified in the system prompt? Answer only YES or NO."

[[criteria]]
name = "no_hallucination"
question = "Does the response avoid adding information or reasoning steps not requested by the system prompt? Answer only YES or NO."

[[criteria]]
name = "handles_ambiguity"
question = "When the input is ambiguous, does the response still commit to a single best-fit category rather than refusing or listing multiple options? Answer only YES or NO."

[[test_prompts]]
prompt = "Category list: [sports, politics, technology, entertainment]. Text: 'The quarterback threw three touchdown passes in the final quarter to seal the victory.'"

[[test_prompts]]
prompt = "Category list: [sports, politics, technology, entertainment]. Text: 'Senate passes bipartisan infrastructure bill after months of negotiation.'"

[[test_prompts]]
prompt = "Category list: [sports, politics, technology, entertainment]. Text: 'The new GPU architecture delivers 40% faster matrix multiplication compared to the previous generation.'"

[[test_prompts]]
prompt = "Category list: [sports, politics, technology, entertainment]. Text: 'Award-winning director announces sequel to last year's highest-grossing film.'"

[[test_prompts]]
prompt = "Category list: [sports, politics, technology, entertainment]. Text: 'The athlete signed a five-year contract reportedly worth 200 million dollars.'"

# ------------------------------------------------------------------
# Per-configuration overrides
# ------------------------------------------------------------------

[configs.raw]
description = "Raw LLM generation, no anneal optimization"
search_strategy = "none"

[configs.raw.enhancements]
strategy_manifest = false
dual_agent = false
two_phase = false
lineage_context = false
episodic_memory = false

[configs.greedy]
description = "Anneal with greedy search, no knowledge injection"
search_strategy = "greedy"

[configs.greedy.enhancements]
strategy_manifest = false
dual_agent = false
two_phase = false
lineage_context = false
episodic_memory = false

[configs.control]
description = "Anneal with default hybrid search and monolithic program.md"
search_strategy = "hybrid"

[configs.control.enhancements]
strategy_manifest = false
dual_agent = false
two_phase = false
lineage_context = false
episodic_memory = false

[configs.treatment]
description = "Anneal with all enhancements: manifest, dual-agent, two-phase, lineage, episodic memory"
search_strategy = "hybrid"

[configs.treatment.enhancements]
strategy_manifest = true
dual_agent = true
two_phase = true
lineage_context = true
episodic_memory = true
