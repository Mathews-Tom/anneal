[meta]
sample_count = 5
confidence_level = 0.95

[generation]
prompt_template = "Using the system prompt in system_prompt.md, summarize the following article:\n\n'{test_prompt}'"
output_format = "text"

[[criteria]]
name = "key_points_captured"
question = "Does the summary capture at least 3 distinct key points from the article? Answer only YES or NO."

[[criteria]]
name = "conciseness"
question = "Is the summary under 100 words with no filler phrases or redundant sentences? Answer only YES or NO."

[[criteria]]
name = "plain_language"
question = "Is the summary written in plain language that a non-expert could understand? Answer only YES or NO."

[[criteria]]
name = "factual_accuracy"
question = "Does the summary accurately represent the article's claims without adding opinions or editorializing? Answer only YES or NO."

[[test_prompts]]
prompt = "OpenAI announced GPT-5 on March 12, 2026, claiming a 40% improvement in reasoning benchmarks over GPT-4.5. The model uses a mixture-of-experts architecture with 1.8 trillion parameters. Early testers report significantly better performance on math and coding tasks, though creative writing quality remains comparable to the previous generation. Pricing starts at $15 per million input tokens. The company also released a smaller GPT-5-mini variant optimized for edge deployment at $0.60 per million tokens."

[[test_prompts]]
prompt = "A study published in Nature Medicine found that a new blood test can detect pancreatic cancer up to 18 months before conventional diagnosis. The test, developed by researchers at Johns Hopkins, analyzes circulating tumor DNA fragments using machine learning classification. In a trial of 4,200 participants, the test achieved 92% sensitivity and 99% specificity. The researchers estimate the test could save approximately 30,000 lives annually in the US alone if deployed as a routine screening tool for high-risk populations."

[[test_prompts]]
prompt = "The European Union passed the AI Liability Directive on February 28, 2026, establishing strict liability for AI systems classified as high-risk. Companies deploying AI in healthcare, education, and financial services must now carry mandatory insurance and maintain audit trails for all automated decisions. Fines for non-compliance reach up to 6% of global annual revenue. The directive takes effect January 1, 2027, with a 6-month grace period for existing deployments. Industry groups estimate compliance costs of $2-5 billion across the EU in the first year."

[[test_prompts]]
prompt = "Tesla's Optimus Gen-3 robot began limited deployment in 5 Amazon warehouses in February 2026. The humanoid robot handles package sorting at 85% the speed of human workers but operates 22 hours per day with 2 hours for charging and maintenance. Initial reports show a 12% error rate in package handling, compared to 3% for human workers. Amazon's pilot program will run for 6 months before deciding on broader deployment. Each unit costs approximately $45,000, with Tesla projecting a price drop to $25,000 by 2028."

[[test_prompts]]
prompt = "Researchers at DeepMind published a paper demonstrating that language models trained with synthetic data generated by stronger models show persistent reasoning gaps compared to models trained on equivalent human-written data. The study compared 7B parameter models trained on 500B tokens of synthetic vs human data across 12 reasoning benchmarks. Synthetic-trained models scored 8-15% lower on novel problem types not represented in the training distribution, though they matched or exceeded human-data models on in-distribution tasks. The authors argue this reveals a fundamental limitation of synthetic data distillation."
