[meta]
sample_count = 10
confidence_level = 0.95

[generation]
prompt_template = "Using the current SKILL.md, generate a single diagram for: '{test_prompt}'"
output_format = "html"

[[criteria]]
name = "text_legibility"
question = "Is ALL text in the diagram clearly legible at 100% zoom? Answer only YES or NO."

[[criteria]]
name = "pastel_colors"
question = "Does the diagram use ONLY pastel or muted colors? Answer only YES or NO."

[[criteria]]
name = "linear_layout"
question = "Does the diagram follow a strictly linear layout with no crossing arrows? Answer only YES or NO."

[[criteria]]
name = "no_ordinals"
question = "Does the diagram contain NO ordinal labels (1., 2., Step 1, Phase 2, etc.)? Answer only YES or NO."

[[test_prompts]]
prompt = "Explain how DNS resolution works"

[[test_prompts]]
prompt = "Show the OAuth2 authorization code flow"

[[test_prompts]]
prompt = "Diagram a CI/CD pipeline from push to production"

[[test_prompts]]
prompt = "Illustrate how a load balancer distributes requests"

[[test_prompts]]
prompt = "Show the lifecycle of an HTTP request through a React app"

[[test_prompts]]
prompt = "Diagram a Kafka producer-consumer system"

[[test_prompts]]
prompt = "Show how database transactions handle rollback"

[[test_prompts]]
prompt = "Diagram a pull request review and merge workflow"

[[test_prompts]]
prompt = "Show how a CDN serves cached vs origin content"

[[test_prompts]]
prompt = "Diagram how JWT authentication works"
